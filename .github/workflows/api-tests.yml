name: API Tests (standalone)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1-5'  # weekday early-morning UTC

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests/api --alluredir=reports/allure-results-api
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: reports/allure-results-api/
