name: Publish Allure Report

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Allure result artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/
          pattern: allure-results-*

      - name: Merge Allure results
        run: |
          mkdir -p combined-results
          if compgen -G "artifacts/allure-results-*" > /dev/null; then
            for d in artifacts/allure-results-*; do
              cp -r "$d"/* combined-results/ 2>/dev/null || true
            done
          fi
          echo "Files in combined-results:"
          ls -la combined-results || true

      - name: Restore Allure history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-checkout
        continue-on-error: true

      - name: Copy previous history into results
        run: |
          if [ -d gh-pages-checkout/history ]; then
            mkdir -p combined-results/history
            cp -r gh-pages-checkout/history/* combined-results/history/ 2>/dev/null || true
          fi

      - name: Set up Java for Allure CLI
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.30.0
          curl -sSLo allure.tgz "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf allure.tgz
          sudo mv "allure-${ALLURE_VERSION}" /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Generate Allure report
        run: |
          allure generate combined-results --clean -o allure-report
          # Copy the latest history forward so the next run can use it
          if [ -d allure-report/history ]; then
            mkdir -p allure-history
            cp -r allure-report/history/* allure-history/
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Persist history to gh-pages branch
        if: always()
        run: |
          if [ ! -d allure-history ]; then
            echo "No history to persist."; exit 0
          fi
          rm -rf gh-pages-checkout
          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages-checkout 2>/dev/null \
            || git init gh-pages-checkout
          cd gh-pages-checkout
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git checkout -b gh-pages
          fi
          rm -rf history
          mkdir -p history
          cp -r ../allure-history/* history/
          git add history
          if git diff --cached --quiet; then
            echo "No history changes to commit."; exit 0
          fi
          git commit -m "chore(allure): update history snapshot"
          git push origin gh-pages
