name: Web Tests (standalone)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 1-5'

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run playwright install chromium --with-deps
      - run: uv run pytest tests/web --alluredir=reports/allure-results-web
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-web
          path: reports/allure-results-web/
